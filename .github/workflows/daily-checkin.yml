name: Daily 52frp Check-in

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. 03:15 UTC = 11:15 Asia/Shanghai.
    - cron: '15 3 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.55.0-jammy
      options: --user root --shm-size=2gb
    env:
      DISPLAY: :99

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Start Xvfb (virtual display for headful browser)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          sleep 2
          echo "Xvfb started on display :99"

      - name: Run check-in (headful mode via Xvfb)
        id: checkin
        env:
          FRP_USERNAME: ${{ secrets.FRP_USERNAME }}
          FRP_PASSWORD: ${{ secrets.FRP_PASSWORD }}
          FRP_BROWSER_HEADLESS: 'false'
          FRP_BROWSER_CHANNEL: chromium
          FRP_DEBUG_DIR: debug-artifacts
        run: |
          set +e
          output=$(node checkin.js 2>&1)
          status=$?
          set -e

          echo "$output"

          result=$(printf '%s\n' "$output" | sed -n 's/^CHECKIN_RESULT: //p' | tail -n 1)
          if [ -z "$result" ]; then
            result="签到脚本执行完成，但未解析到结果"
          fi

          {
            echo "checkin_result<<EOF"
            echo "$result"
            echo "EOF"
            echo "exit_code=$status"
          } >> "$GITHUB_OUTPUT"

          exit $status

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: 52frp-debug-artifacts
          path: debug-artifacts/
          if-no-files-found: ignore

      - name: PushPlus notification
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: node push_notification.js "${{ steps.checkin.outputs.checkin_result }}"
